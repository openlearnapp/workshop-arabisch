version: 1
number: 3
title: "Zahlen und Zeitangaben"
description: "Arabische Zahlen von 1 bis 20, Wochentage und nützliche Zeitausdrücke"
sections:
  - title: "Zahlen 1 bis 10"
    explanation: |
      **Arabische Zahlen** (الأرقام) sind weltweit bekannt – unsere „arabischen Ziffern" stammen ursprünglich aus dem Arabischen.
      Im modernen Hocharabisch werden sowohl die östlichen als auch die westlichen Ziffern verwendet.
      Hier lernen Sie die ausgeschriebenen Zahlen von 1 bis 10.
    examples:
      - q: "واحد"
        a: "eins (1)"
        rel:
          - ["واحد", "eins", "Zahl 1"]
      - q: "اثنان"
        a: "zwei (2)"
        rel:
          - ["اثنان", "zwei", "Zahl 2"]
      - q: "ثلاثة"
        a: "drei (3)"
        rel:
          - ["ثلاثة", "drei", "Zahl 3"]
      - q: "أربعة"
        a: "vier (4)"
        rel:
          - ["أربعة", "vier", "Zahl 4"]
      - q: "خمسة"
        a: "fünf (5)"
        rel:
          - ["خمسة", "fünf", "Zahl 5"]
  - title: "Zahlen 11 bis 20"
    explanation: |
      **Die Zahlen 11 bis 20** im Arabischen folgen einem eigenen Muster.
      Die Zahlen 11 und 12 sind besondere Formen, während 13 bis 19 aus der Einerzahl und dem Wort „عشر" (zehn) zusammengesetzt sind.
      Die Zahl 20 hat wieder eine eigene Form: „عشرون".
    examples:
      - q: "أحد عشر"
        a: "elf (11)"
        rel:
          - ["أحد عشر", "elf", "Zahl 11"]
      - q: "اثنا عشر"
        a: "zwölf (12)"
        rel:
          - ["اثنا عشر", "zwölf", "Zahl 12"]
      - q: "خمسة عشر"
        a: "fünfzehn (15)"
        rel:
          - ["خمسة عشر", "fünfzehn", "Zahl 15"]
      - q: "عشرون"
        a: "zwanzig (20)"
        rel:
          - ["عشرون", "zwanzig", "Zahl 20"]
  - title: "Wochentage und Zeitausdrücke"
    explanation: |
      **Die Wochentage** auf Arabisch beginnen traditionell mit dem Sonntag (الأحد).
      Viele Tagesnamen leiten sich von den arabischen Zahlen ab.
      Zeitausdrücke wie „heute", „morgen" und „gestern" sind im Alltag unverzichtbar.
    examples:
      - q: "الاثنين"
        a: "Montag"
        rel:
          - ["الاثنين", "Montag", "Wochentag, abgeleitet von اثنان (zwei)"]
      - q: "الجمعة"
        a: "Freitag"
        rel:
          - ["الجمعة", "Freitag", "Wochentag, Tag des Gemeinschaftsgebets"]
      - q: "اليوم"
        a: "heute"
        rel:
          - ["اليوم", "heute", "Zeitangabe"]
      - q: "غدا"
        a: "morgen"
        rel:
          - ["غدا", "morgen", "Zeitangabe"]
      - q: "أمس"
        a: "gestern"
        rel:
          - ["أمس", "gestern", "Zeitangabe"]
