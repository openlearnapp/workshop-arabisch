version: 1
number: 4
title: "Essen und Einkaufen"
description: "Arabische Vokabeln rund um Lebensmittel, Bestellen im Restaurant und Einkaufen"
sections:
  - title: "Lebensmittel"
    explanation: |
      **Die arabische Küche** ist reich und vielfältig. Von Fladenbrot (خبز) bis hin zu Gewürzen –
      Essen spielt in der arabischen Kultur eine zentrale Rolle.
      Hier lernen Sie die wichtigsten Wörter für Lebensmittel.
    examples:
      - q: "خبز"
        a: "Brot"
        rel:
          - ["خبز", "Brot", "Grundnahrungsmittel"]
      - q: "ماء"
        a: "Wasser"
        rel:
          - ["ماء", "Wasser", "Getränk"]
      - q: "أرز"
        a: "Reis"
        rel:
          - ["أرز", "Reis", "Grundnahrungsmittel"]
      - q: "دجاج"
        a: "Hähnchen"
        rel:
          - ["دجاج", "Hähnchen", "Fleisch"]
      - q: "فاكهة"
        a: "Obst"
        rel:
          - ["فاكهة", "Obst", "Lebensmittelkategorie"]
  - title: "Im Restaurant bestellen"
    explanation: |
      **Im Restaurant** (في المطعم) auf Arabisch bestellen zu können, ist sehr praktisch.
      Die Formulierung „أريد" (urīdu) bedeutet „ich möchte" und ist der Schlüssel zum Bestellen.
      Kombinieren Sie diese Wendung mit Lebensmitteln aus dem vorherigen Abschnitt.
    examples:
      - q: "أريد القائمة، من فضلك"
        a: "Ich möchte die Speisekarte, bitte"
        rel:
          - ["أريد", "ich möchte", "Verb, sehr nützlich zum Bestellen"]
          - ["القائمة", "die Speisekarte", "Substantiv"]
      - q: "أريد ماء، من فضلك"
        a: "Ich möchte Wasser, bitte"
        rel:
          - ["أريد", "ich möchte", "Verb"]
          - ["ماء", "Wasser", "Getränk"]
      - q: "الحساب، من فضلك"
        a: "Die Rechnung, bitte"
        rel:
          - ["الحساب", "die Rechnung", "Substantiv"]
      - q: "هذا لذيذ"
        a: "Das ist lecker"
        rel:
          - ["هذا", "das / dies", "Demonstrativpronomen"]
          - ["لذيذ", "lecker", "Adjektiv"]
      - q: "هل عندكم طعام حلال؟"
        a: "Haben Sie Halal-Essen?"
        rel:
          - ["هل", "Fragepartikel", "leitet eine Ja/Nein-Frage ein"]
          - ["عندكم", "bei euch / haben Sie", "Besitzausdruck"]
          - ["طعام حلال", "Halal-Essen", "erlaubtes Essen nach islamischem Recht"]
  - title: "Einkaufen und Preise"
    explanation: |
      **Einkaufen** (التسوق) auf einem arabischen Markt (سوق) ist ein besonderes Erlebnis.
      Handeln gehört in vielen arabischen Ländern zur Einkaufskultur.
      Mit diesen Ausdrücken können Sie nach Preisen fragen und verhandeln.
    examples:
      - q: "بكم هذا؟"
        a: "Wie viel kostet das?"
        rel:
          - ["بكم", "wie viel / für wie viel", "Preisfrage"]
          - ["هذا", "das / dies", "Demonstrativpronomen"]
      - q: "هذا غالي جدا"
        a: "Das ist sehr teuer"
        rel:
          - ["غالي", "teuer", "Adjektiv"]
          - ["جدا", "sehr", "Verstärkungswort"]
      - q: "هل يوجد تخفيض؟"
        a: "Gibt es einen Rabatt?"
        rel:
          - ["يوجد", "es gibt", "Existenzausdruck"]
          - ["تخفيض", "Rabatt / Ermäßigung", "Substantiv"]
      - q: "أريد هذا"
        a: "Ich möchte das"
        rel:
          - ["أريد", "ich möchte", "Verb"]
          - ["هذا", "das / dies", "Demonstrativpronomen"]
