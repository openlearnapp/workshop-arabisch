version: 1
number: 5
title: "Reisen und Wegbeschreibung"
description: "Nützliche Ausdrücke für Reisen, Wegbeschreibungen und Transportmittel auf Arabisch"
sections:
  - title: "Wegbeschreibung"
    explanation: |
      **Wegbeschreibungen** auf Arabisch zu verstehen, ist besonders hilfreich, wenn Sie in einem arabischen Land unterwegs sind.
      Die Grundrichtungen „rechts" (يمين), „links" (يسار) und „geradeaus" (مباشرة) sind dabei unverzichtbar.
    examples:
      - q: "أين المطار؟"
        a: "Wo ist der Flughafen?"
        rel:
          - ["أين", "wo", "Fragewort für Orte"]
          - ["المطار", "der Flughafen", "Substantiv"]
      - q: "على اليمين"
        a: "rechts / auf der rechten Seite"
        rel:
          - ["على", "auf", "Präposition"]
          - ["اليمين", "rechts", "Richtungsangabe"]
      - q: "على اليسار"
        a: "links / auf der linken Seite"
        rel:
          - ["على", "auf", "Präposition"]
          - ["اليسار", "links", "Richtungsangabe"]
      - q: "مباشرة"
        a: "geradeaus"
        rel:
          - ["مباشرة", "geradeaus / direkt", "Richtungsangabe"]
      - q: "هل هو بعيد؟"
        a: "Ist es weit?"
        rel:
          - ["هل", "Fragepartikel", "leitet eine Ja/Nein-Frage ein"]
          - ["بعيد", "weit / fern", "Adjektiv"]
  - title: "Transportmittel"
    explanation: |
      **Transportmittel** (وسائل النقل) zu kennen, erleichtert das Reisen enorm.
      In vielen arabischen Städten sind Taxis (سيارة أجرة) ein beliebtes Fortbewegungsmittel.
      Hier lernen Sie die wichtigsten Begriffe rund um den Transport.
    examples:
      - q: "سيارة أجرة"
        a: "Taxi"
        rel:
          - ["سيارة", "Auto / Wagen", "Substantiv"]
          - ["أجرة", "Miete / Gebühr", "Substantiv"]
      - q: "حافلة"
        a: "Bus"
        rel:
          - ["حافلة", "Bus", "Transportmittel"]
      - q: "قطار"
        a: "Zug"
        rel:
          - ["قطار", "Zug", "Transportmittel"]
      - q: "محطة"
        a: "Bahnhof / Station"
        rel:
          - ["محطة", "Bahnhof / Station", "Substantiv"]
      - q: "تذكرة"
        a: "Fahrkarte / Ticket"
        rel:
          - ["تذكرة", "Fahrkarte", "Substantiv"]
  - title: "Nützliche Reiseausdrücke"
    explanation: |
      **Reiseausdrücke** helfen Ihnen, sich in alltäglichen Situationen zurechtzufinden.
      Ob Sie nach dem Weg fragen, ein Hotelzimmer buchen oder Hilfe benötigen –
      diese Sätze sind Ihre wichtigsten Begleiter auf Reisen.
    examples:
      - q: "أحتاج مساعدة"
        a: "Ich brauche Hilfe"
        rel:
          - ["أحتاج", "ich brauche", "Verb"]
          - ["مساعدة", "Hilfe", "Substantiv"]
      - q: "أين الفندق؟"
        a: "Wo ist das Hotel?"
        rel:
          - ["أين", "wo", "Fragewort"]
          - ["الفندق", "das Hotel", "Substantiv"]
      - q: "أريد غرفة"
        a: "Ich möchte ein Zimmer"
        rel:
          - ["أريد", "ich möchte", "Verb"]
          - ["غرفة", "Zimmer", "Substantiv"]
      - q: "جواز السفر"
        a: "Reisepass"
        rel:
          - ["جواز", "Pass / Erlaubnis", "Substantiv"]
          - ["السفر", "das Reisen", "Substantiv"]
      - q: "أين دورة المياه؟"
        a: "Wo ist die Toilette?"
        rel:
          - ["أين", "wo", "Fragewort"]
          - ["دورة المياه", "Toilette (wörtlich: Wasserkreislauf)", "höflicher Ausdruck"]
