version: 1
number: 1
title: "Begrüßungen und Höflichkeit"
description: "Die wichtigsten Begrüßungen und höflichen Ausdrücke auf Arabisch"
sections:
  - title: "Begrüßungen"
    explanation: |
      **Arabische Begrüßungen** sind ein wichtiger Teil der arabischen Kultur.
      Die häufigste Begrüßung ist „السلام عليكم" (as-salāmu ʿalaykum), was „Friede sei mit euch" bedeutet.
      Diese Begrüßung wird in der gesamten arabischen Welt verwendet und ist sowohl formell als auch informell geeignet.
    examples:
      - q: "السلام عليكم"
        a: "Friede sei mit euch (Hallo)"
        rel:
          - ["السلام عليكم", "Friede sei mit euch", "die wichtigste arabische Begrüßung"]
      - q: "وعليكم السلام"
        a: "Und Friede sei mit euch (Antwort auf السلام عليكم)"
        rel:
          - ["وعليكم السلام", "Und Friede sei mit euch", "die Antwort auf die Begrüßung"]
      - q: "مرحبا"
        a: "Willkommen / Hallo"
        rel:
          - ["مرحبا", "Willkommen", "eine freundliche, universelle Begrüßung"]
      - q: "صباح الخير"
        a: "Guten Morgen"
        rel:
          - ["صباح", "Morgen", "Tageszeit"]
          - ["الخير", "das Gute", "Adjektiv in der Begrüßung"]
      - q: "مساء الخير"
        a: "Guten Abend"
        rel:
          - ["مساء", "Abend", "Tageszeit"]
          - ["الخير", "das Gute", "Adjektiv in der Begrüßung"]
  - title: "Höfliche Ausdrücke"
    explanation: |
      **Höflichkeit** spielt in der arabischen Kultur eine große Rolle.
      Es ist wichtig, grundlegende höfliche Ausdrücke zu kennen, um Respekt und Freundlichkeit zu zeigen.
      Das Wort „شكرا" (schukran) wird sehr häufig verwendet und ist leicht zu merken.
    examples:
      - q: "شكرا"
        a: "Danke"
        rel:
          - ["شكرا", "Danke", "der gebräuchlichste Ausdruck für Dankbarkeit"]
      - q: "من فضلك"
        a: "Bitte (wenn man um etwas bittet)"
        rel:
          - ["من فضلك", "Bitte", "höfliche Bitte an eine Person"]
      - q: "عفوا"
        a: "Entschuldigung / Bitte (als Antwort auf Danke)"
        rel:
          - ["عفوا", "Entschuldigung", "auch als Antwort auf Danke verwendet"]
      - q: "كيف حالك؟"
        a: "Wie geht es dir?"
        rel:
          - ["كيف", "wie", "Fragewort"]
          - ["حالك", "dein Zustand", "bezieht sich auf das Befinden"]
      - q: "بخير، الحمد لله"
        a: "Gut, Gott sei Dank"
        rel:
          - ["بخير", "gut / in Ordnung", "Zustandsbeschreibung"]
          - ["الحمد لله", "Gott sei Dank", "häufiger Ausdruck der Dankbarkeit"]
  - title: "Abschied"
    explanation: |
      **Verabschiedungen** auf Arabisch sind oft herzlich und warmherzig.
      Der häufigste Abschiedsgruß ist „مع السلامة" (maʿa s-salāma), was wörtlich „mit dem Frieden" bedeutet.
    examples:
      - q: "مع السلامة"
        a: "Auf Wiedersehen (mit dem Frieden)"
        rel:
          - ["مع", "mit", "Präposition"]
          - ["السلامة", "der Frieden / die Sicherheit", "Substantiv"]
      - q: "إلى اللقاء"
        a: "Bis zum nächsten Mal"
        rel:
          - ["إلى", "bis", "Präposition"]
          - ["اللقاء", "das Treffen", "Substantiv"]
      - q: "تصبح على خير"
        a: "Gute Nacht"
        rel:
          - ["تصبح", "du wirst", "Verb"]
          - ["على خير", "auf Gutes / im Guten", "Wunschformel"]
      - q: "أراك لاحقا"
        a: "Bis später"
        rel:
          - ["أراك", "ich sehe dich", "Verb mit Pronomen"]
          - ["لاحقا", "später", "Zeitadverb"]
