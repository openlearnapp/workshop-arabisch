version: 1
number: 5
title: "السفر والاتجاهات"
description: "عبارات مفيدة للسفر والاتجاهات ووسائل النقل بالإنجليزية"
sections:
  - title: "الاتجاهات"
    explanation: |
      **فهم الاتجاهات** بالإنجليزية مفيد جدًا عند السفر.
      الاتجاهات الأساسية "يمين" (right) و"يسار" (left) و"مباشرة" (straight ahead) ضرورية.
    examples:
      - q: "Where is the airport?"
        a: "أين المطار؟"
        rel:
          - ["Where", "أين", "كلمة استفهام للأماكن"]
          - ["the airport", "المطار", "اسم"]
      - q: "on the right"
        a: "على اليمين"
        rel:
          - ["right", "يمين", "اتجاه"]
      - q: "on the left"
        a: "على اليسار"
        rel:
          - ["left", "يسار", "اتجاه"]
      - q: "straight ahead"
        a: "مباشرة / إلى الأمام"
        rel:
          - ["straight ahead", "مباشرة", "اتجاه"]
      - q: "Is it far?"
        a: "هل هو بعيد؟"
        rel:
          - ["far", "بعيد", "صفة"]
  - title: "وسائل النقل"
    explanation: |
      **معرفة وسائل النقل** (transportation) تسهل السفر كثيرًا.
      هذه المفردات أساسية للتنقل في أي بلد يتحدث الإنجليزية.
    examples:
      - q: "taxi"
        a: "سيارة أجرة"
        rel:
          - ["taxi", "سيارة أجرة", "وسيلة نقل"]
      - q: "bus"
        a: "حافلة"
        rel:
          - ["bus", "حافلة", "وسيلة نقل"]
      - q: "train"
        a: "قطار"
        rel:
          - ["train", "قطار", "وسيلة نقل"]
      - q: "station"
        a: "محطة"
        rel:
          - ["station", "محطة", "اسم"]
      - q: "ticket"
        a: "تذكرة"
        rel:
          - ["ticket", "تذكرة", "اسم"]
  - title: "عبارات سفر مفيدة"
    explanation: |
      **عبارات السفر** تساعدك على التعامل مع المواقف اليومية.
      سواء كنت تسأل عن الطريق أو تحجز غرفة فندق أو تحتاج مساعدة.
    examples:
      - q: "I need help"
        a: "أحتاج مساعدة"
        rel:
          - ["I need", "أحتاج", "فعل"]
          - ["help", "مساعدة", "اسم"]
      - q: "Where is the hotel?"
        a: "أين الفندق؟"
        rel:
          - ["Where", "أين", "كلمة استفهام"]
          - ["the hotel", "الفندق", "اسم"]
      - q: "I want a room"
        a: "أريد غرفة"
        rel:
          - ["I want", "أريد", "فعل"]
          - ["a room", "غرفة", "اسم"]
      - q: "passport"
        a: "جواز السفر"
        rel:
          - ["passport", "جواز السفر", "اسم"]
      - q: "Where is the restroom?"
        a: "أين دورة المياه؟"
        rel:
          - ["Where", "أين", "كلمة استفهام"]
          - ["the restroom", "دورة المياه", "اسم"]
