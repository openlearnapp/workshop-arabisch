version: 1
number: 1
title: "التحيات والأدب"
description: "أهم التحيات والعبارات المهذبة باللغة الإنجليزية"
sections:
  - title: "التحيات"
    explanation: |
      **التحيات الإنجليزية** بسيطة ومتنوعة.
      التحية الأكثر شيوعًا هي "Hello" وهي مناسبة لجميع المواقف.
      "Hi" أكثر ودية وغير رسمية.
    examples:
      - q: "Hello"
        a: "مرحبا"
        rel:
          - ["Hello", "مرحبا", "تحية عامة"]
      - q: "Hi"
        a: "أهلا"
        rel:
          - ["Hi", "أهلا", "تحية غير رسمية"]
      - q: "Good morning"
        a: "صباح الخير"
        rel:
          - ["Good", "جيد / طيب", "صفة"]
          - ["morning", "صباح", "وقت من اليوم"]
      - q: "Good evening"
        a: "مساء الخير"
        rel:
          - ["Good", "جيد / طيب", "صفة"]
          - ["evening", "مساء", "وقت من اليوم"]
      - q: "Welcome"
        a: "أهلا وسهلا"
        rel:
          - ["Welcome", "أهلا وسهلا", "ترحيب"]
  - title: "عبارات مهذبة"
    explanation: |
      **الأدب** مهم في الثقافة الإنجليزية.
      "Please" (من فضلك) و "Thank you" (شكرًا) تُستخدمان كثيرًا.
      كلمة "Sorry" تُستخدم للاعتذار وأيضًا لجذب الانتباه.
    examples:
      - q: "Thank you"
        a: "شكرًا"
        rel:
          - ["Thank you", "شكرًا", "تعبير عن الامتنان"]
      - q: "Please"
        a: "من فضلك"
        rel:
          - ["Please", "من فضلك", "للطلب المهذب"]
      - q: "Excuse me"
        a: "عذرًا / المعذرة"
        rel:
          - ["Excuse me", "عذرًا", "للاعتذار أو لفت الانتباه"]
      - q: "How are you?"
        a: "كيف حالك؟"
        rel:
          - ["How", "كيف", "كلمة استفهام"]
          - ["are you", "أنت / حالك", "فعل + ضمير"]
      - q: "I'm fine, thanks"
        a: "أنا بخير، شكرًا"
        rel:
          - ["I'm fine", "أنا بخير", "حالة"]
          - ["thanks", "شكرًا", "شكر غير رسمي"]
  - title: "الوداع"
    explanation: |
      **عبارات الوداع** في الإنجليزية بسيطة.
      "Goodbye" هي الأكثر رسمية، بينما "Bye" غير رسمية وشائعة.
    examples:
      - q: "Goodbye"
        a: "مع السلامة"
        rel:
          - ["Goodbye", "مع السلامة", "وداع رسمي"]
      - q: "Bye"
        a: "مع السلامة (غير رسمي)"
        rel:
          - ["Bye", "مع السلامة", "وداع غير رسمي"]
      - q: "Good night"
        a: "تصبح على خير"
        rel:
          - ["Good", "سعيد / طيب", "صفة"]
          - ["night", "ليلة", "وقت من اليوم"]
      - q: "See you later"
        a: "أراك لاحقًا"
        rel:
          - ["See you", "أراك", "فعل + ضمير"]
          - ["later", "لاحقًا", "ظرف زمان"]
