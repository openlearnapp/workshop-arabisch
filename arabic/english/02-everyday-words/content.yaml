version: 1
number: 2
title: "كلمات يومية"
description: "كلمات أساسية للحياة اليومية – المتضادات والألوان وأفراد العائلة"
sections:
  - title: "نعم، لا، والمتضادات"
    explanation: |
      **المتضادات الأساسية** ضرورية للتواصل باللغة الإنجليزية.
      "Yes" تعني "نعم" و "No" تعني "لا".
      هذه الكلمات البسيطة تساعدك على الإجابة على الأسئلة فورًا.
    examples:
      - q: "Yes"
        a: "نعم"
        rel:
          - ["Yes", "نعم", "موافقة"]
      - q: "No"
        a: "لا"
        rel:
          - ["No", "لا", "نفي"]
      - q: "big"
        a: "كبير"
        rel:
          - ["big", "كبير", "صفة، عكس small"]
      - q: "small"
        a: "صغير"
        rel:
          - ["small", "صغير", "صفة، عكس big"]
      - q: "new"
        a: "جديد"
        rel:
          - ["new", "جديد", "صفة، عكس old"]
  - title: "الألوان"
    explanation: |
      **الألوان** في الإنجليزية بسيطة ولا تتغير حسب الجنس أو العدد.
      هنا ستتعلم أهم الألوان باللغة الإنجليزية.
    examples:
      - q: "white"
        a: "أبيض"
        rel:
          - ["white", "أبيض", "لون"]
      - q: "black"
        a: "أسود"
        rel:
          - ["black", "أسود", "لون"]
      - q: "red"
        a: "أحمر"
        rel:
          - ["red", "أحمر", "لون"]
      - q: "blue"
        a: "أزرق"
        rel:
          - ["blue", "أزرق", "لون"]
      - q: "green"
        a: "أخضر"
        rel:
          - ["green", "أخضر", "لون"]
  - title: "أفراد العائلة"
    explanation: |
      **العائلة** (family) مهمة في جميع الثقافات.
      من المفيد معرفة أسماء أفراد العائلة باللغة الإنجليزية.
    examples:
      - q: "father"
        a: "أب"
        rel:
          - ["father", "أب", "فرد من العائلة"]
      - q: "mother"
        a: "أم"
        rel:
          - ["mother", "أم", "فرد من العائلة"]
      - q: "son"
        a: "ابن"
        rel:
          - ["son", "ابن", "فرد من العائلة"]
      - q: "daughter"
        a: "ابنة"
        rel:
          - ["daughter", "ابنة", "فرد من العائلة"]
      - q: "brother"
        a: "أخ"
        rel:
          - ["brother", "أخ", "فرد من العائلة"]
