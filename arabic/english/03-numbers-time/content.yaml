version: 1
number: 3
title: "الأرقام والوقت"
description: "الأرقام الإنجليزية من 1 إلى 20 وأيام الأسبوع وتعبيرات الوقت"
sections:
  - title: "الأرقام من 1 إلى 10"
    explanation: |
      **الأرقام الإنجليزية** من أول ما يجب تعلمه.
      هنا ستتعلم الأرقام من 1 إلى 10 باللغة الإنجليزية.
    examples:
      - q: "one"
        a: "واحد (1)"
        rel:
          - ["one", "واحد", "رقم 1"]
      - q: "two"
        a: "اثنان (2)"
        rel:
          - ["two", "اثنان", "رقم 2"]
      - q: "three"
        a: "ثلاثة (3)"
        rel:
          - ["three", "ثلاثة", "رقم 3"]
      - q: "four"
        a: "أربعة (4)"
        rel:
          - ["four", "أربعة", "رقم 4"]
      - q: "five"
        a: "خمسة (5)"
        rel:
          - ["five", "خمسة", "رقم 5"]
  - title: "الأرقام من 11 إلى 20"
    explanation: |
      **الأرقام من 11 إلى 20** في الإنجليزية لها أشكال خاصة.
      الأرقام 11 و 12 لهما شكل فريد، بينما 13 إلى 19 تنتهي بـ "-teen".
    examples:
      - q: "eleven"
        a: "أحد عشر (11)"
        rel:
          - ["eleven", "أحد عشر", "رقم 11"]
      - q: "twelve"
        a: "اثنا عشر (12)"
        rel:
          - ["twelve", "اثنا عشر", "رقم 12"]
      - q: "fifteen"
        a: "خمسة عشر (15)"
        rel:
          - ["fifteen", "خمسة عشر", "رقم 15"]
      - q: "twenty"
        a: "عشرون (20)"
        rel:
          - ["twenty", "عشرون", "رقم 20"]
  - title: "أيام الأسبوع وتعبيرات الوقت"
    explanation: |
      **أيام الأسبوع** في الإنجليزية تبدأ بيوم الاثنين (Monday) في معظم الدول.
      تعبيرات الوقت مثل "today" و"tomorrow" و"yesterday" ضرورية في الحياة اليومية.
    examples:
      - q: "Monday"
        a: "الاثنين"
        rel:
          - ["Monday", "الاثنين", "يوم من أيام الأسبوع"]
      - q: "Friday"
        a: "الجمعة"
        rel:
          - ["Friday", "الجمعة", "يوم من أيام الأسبوع"]
      - q: "today"
        a: "اليوم"
        rel:
          - ["today", "اليوم", "تعبير زمني"]
      - q: "tomorrow"
        a: "غدًا"
        rel:
          - ["tomorrow", "غدًا", "تعبير زمني"]
      - q: "yesterday"
        a: "أمس"
        rel:
          - ["yesterday", "أمس", "تعبير زمني"]
