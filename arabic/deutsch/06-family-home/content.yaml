version: 1
number: 6
title: "العائلة والمنزل"
description: "مفردات أساسية عن العائلة والمنزل باللغة الألمانية"
sections:
  - title: "أفراد العائلة"
    explanation: |
      **العائلة** في الثقافة الألمانية مهمة جداً، لكن العائلة النووية (الأب والأم والأطفال) هي الأكثر شيوعاً.
      من المهم تعلم كلمات القرابة الأساسية للتحدث عن عائلتك باللغة الألمانية.
      لاحظ أن الألمانية تستخدم المؤنث عبر إضافة اللاحقة **-in** في الغالب (مثل: Lehrer ← Lehrerin).
    examples:
      - q: "Vater"
        a: "أب"
        rel:
          - ["Vater", "أب", "علاقة عائلية"]
      - q: "Mutter"
        a: "أم"
        rel:
          - ["Mutter", "أم", "علاقة عائلية"]
      - q: "Bruder"
        a: "أخ"
        rel:
          - ["Bruder", "أخ", "الإخوة"]
      - q: "Schwester"
        a: "أخت"
        rel:
          - ["Schwester", "أخت", "الإخوة"]
      - q: "Großvater"
        a: "جد"
        rel:
          - ["Großvater", "جد", "الجيل الأكبر"]
      - q: "Großmutter"
        a: "جدة"
        rel:
          - ["Großmutter", "جدة", "الجيل الأكبر"]
  - title: "في المنزل"
    explanation: |
      **المنزل الألماني** (das Haus) يتميز بدقة التنظيم والنظافة.
      يحب الألمان ترتيب منازلهم وصيانتها بعناية.
      هذه هي أسماء غرف المنزل الأساسية التي ستحتاج إليها في حياتك اليومية.
    examples:
      - q: "Schlafzimmer"
        a: "غرفة النوم"
        rel:
          - ["Schlafzimmer", "غرفة النوم", "اسم غرفة"]
      - q: "Küche"
        a: "المطبخ"
        rel:
          - ["Küche", "المطبخ", "اسم غرفة"]
      - q: "Badezimmer"
        a: "الحمام"
        rel:
          - ["Badezimmer", "الحمام", "اسم غرفة"]
      - q: "Wohnzimmer"
        a: "غرفة الجلوس / الصالة"
        rel:
          - ["Wohnzimmer", "غرفة الجلوس", "اسم غرفة"]
      - q: "Garten"
        a: "الحديقة"
        rel:
          - ["Garten", "الحديقة", "المنطقة الخارجية"]
      - q: "Tür"
        a: "الباب"
        rel:
          - ["Tür", "الباب", "جزء من المنزل"]
  - title: "التحدث عن العائلة"
    explanation: |
      **التحدث عن العائلة** من أكثر الموضوعات شيوعاً عند التعارف في ألمانيا.
      هذه الجمل ستساعدك على وصف عائلتك بطريقة طبيعية وبسيطة.
    examples:
      - q: "Ich habe zwei Brüder und eine Schwester"
        a: "عندي أخوان وأخت"
        rel:
          - ["Ich-habe-Familie", "عندي / لدي", "جملة تعبير عن الامتلاك"]
      - q: "Bist du verheiratet?"
        a: "هل أنت متزوج؟"
        rel:
          - ["verheiratet", "متزوج", "صفة"]
      - q: "Ich habe zwei Kinder"
        a: "لدي طفلان"
        rel:
          - ["Kinder", "أطفال", "اسم جمع"]
      - q: "Ich wohne mit meiner Familie"
        a: "أسكن مع عائلتي"
        rel:
          - ["wohne", "أسكن", "فعل"]
          - ["Familie", "عائلة", "اسم"]
      - q: "Herzlich willkommen!"
        a: "أهلاً وسهلاً! / مرحباً بك!"
        rel:
          - ["Herzlich-willkommen", "أهلاً وسهلاً", "تعبير ترحيب ألماني"]
