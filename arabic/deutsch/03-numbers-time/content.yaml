version: 1
number: 3
title: "الأرقام والوقت"
description: "الأرقام الألمانية من 1 إلى 20 وأيام الأسبوع وتعبيرات الوقت"
sections:
  - title: "الأرقام من 1 إلى 10"
    explanation: |
      **الأرقام الألمانية** سهلة التعلم.
      هنا ستتعلم الأرقام من 1 إلى 10 باللغة الألمانية.
    examples:
      - q: "eins"
        a: "واحد (1)"
        rel:
          - ["eins", "واحد", "رقم 1"]
      - q: "zwei"
        a: "اثنان (2)"
        rel:
          - ["zwei", "اثنان", "رقم 2"]
      - q: "drei"
        a: "ثلاثة (3)"
        rel:
          - ["drei", "ثلاثة", "رقم 3"]
      - q: "vier"
        a: "أربعة (4)"
        rel:
          - ["vier", "أربعة", "رقم 4"]
      - q: "fünf"
        a: "خمسة (5)"
        rel:
          - ["fünf", "خمسة", "رقم 5"]
  - title: "الأرقام من 11 إلى 20"
    explanation: |
      **الأرقام من 11 إلى 20** في الألمانية تتبع نمطًا خاصًا.
      الأرقام من 13 إلى 19 تتكون من رقم الآحاد + "zehn" (عشرة).
    examples:
      - q: "elf"
        a: "أحد عشر (11)"
        rel:
          - ["elf", "أحد عشر", "رقم 11"]
      - q: "zwölf"
        a: "اثنا عشر (12)"
        rel:
          - ["zwölf", "اثنا عشر", "رقم 12"]
      - q: "fünfzehn"
        a: "خمسة عشر (15)"
        rel:
          - ["fünfzehn", "خمسة عشر", "رقم 15"]
      - q: "zwanzig"
        a: "عشرون (20)"
        rel:
          - ["zwanzig", "عشرون", "رقم 20"]
  - title: "أيام الأسبوع وتعبيرات الوقت"
    explanation: |
      **أيام الأسبوع** في الألمانية تبدأ بيوم الاثنين (Montag).
      تعبيرات الوقت مثل "اليوم" و"غدًا" و"أمس" لا غنى عنها في الحياة اليومية.
    examples:
      - q: "Montag"
        a: "الاثنين"
        rel:
          - ["Montag", "الاثنين", "يوم من أيام الأسبوع"]
      - q: "Freitag"
        a: "الجمعة"
        rel:
          - ["Freitag", "الجمعة", "يوم من أيام الأسبوع"]
      - q: "heute"
        a: "اليوم"
        rel:
          - ["heute", "اليوم", "تعبير زمني"]
      - q: "morgen"
        a: "غدًا"
        rel:
          - ["morgen", "غدًا", "تعبير زمني"]
      - q: "gestern"
        a: "أمس"
        rel:
          - ["gestern", "أمس", "تعبير زمني"]
