<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d20"/>
      <stop offset="100%" style="stop-color:#1a7a40"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Geometric ornament (inspired by Arabic geometric patterns) -->
  <g opacity="0.1">
    <polygon points="640,60 700,140 760,60 700,20" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="640,60 700,140 760,60 700,20" fill="none" stroke="white" stroke-width="1" transform="rotate(90, 700, 90)"/>
    <circle cx="700" cy="90" r="50" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="180" cy="680" r="45" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="1100" cy="680" r="45" fill="none" stroke="white" stroke-width="1"/>
    <rect x="120" y="120" width="60" height="60" fill="none" stroke="white" stroke-width="1" transform="rotate(45, 150, 150)"/>
    <rect x="1100" y="120" width="60" height="60" fill="none" stroke="white" stroke-width="1" transform="rotate(45, 1130, 150)"/>
  </g>

  <!-- Center card -->
  <rect x="290" y="150" width="700" height="500" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Crescent and star (green = Saudi/Arab flag inspired) -->
  <circle cx="640" cy="290" r="70" fill="rgba(255,255,255,0.9)"/>
  <circle cx="665" cy="272" r="54" fill="#125030"/>
  <polygon points="715,248 721,266 740,266 725,277 731,295 715,284 699,295 705,277 690,266 709,266"
           fill="rgba(255,255,255,0.9)"/>

  <!-- Main title -->
  <text x="640" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="bold"
        text-anchor="middle" fill="white" letter-spacing="4">Arabisch</text>

  <!-- Subtitle -->
  <text x="640" y="492" font-family="Arial, Helvetica, sans-serif" font-size="30"
        text-anchor="middle" fill="rgba(255,255,255,0.75)" letter-spacing="2">العربية · Arabisch lernen</text>

  <!-- Divider -->
  <rect x="520" y="520" width="240" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Label -->
  <text x="640" y="562" font-family="Arial, Helvetica, sans-serif" font-size="22"
        text-anchor="middle" fill="rgba(255,255,255,0.5)" letter-spacing="3">5 LEKTIONEN · OPEN LEARN</text>
</svg>
