version: 1
number: 7
title: "العمل والتعليم"
description: "المهن وبيئة العمل والتعليم باللغة الألمانية"
sections:
  - title: "المهن"
    explanation: |
      **المهن** (Berufe) من أهم الموضوعات عند التعارف في ألمانيا.
      السؤال الشائع "Was bist du von Beruf?" (ما هي مهنتك؟) ستسمعه كثيراً.
      في الألمانية، تتميز المهن المؤنثة عادةً بإضافة **-in** في النهاية.
    examples:
      - q: "Arzt"
        a: "طبيب"
        rel:
          - ["Arzt", "طبيب", "مهنة"]
      - q: "Ingenieur"
        a: "مهندس"
        rel:
          - ["Ingenieur", "مهندس", "مهنة"]
      - q: "Lehrer"
        a: "مدرِّس"
        rel:
          - ["Lehrer", "مدرِّس", "مهنة"]
      - q: "Anwalt"
        a: "محامي"
        rel:
          - ["Anwalt", "محامي", "مهنة"]
      - q: "Kaufmann"
        a: "تاجر / رجل أعمال"
        rel:
          - ["Kaufmann", "تاجر", "مهنة"]
      - q: "Krankenpfleger"
        a: "ممرِّض"
        rel:
          - ["Krankenpfleger", "ممرِّض", "مهنة"]
  - title: "في مكان العمل"
    explanation: |
      **بيئة العمل الألمانية** تتسم بالدقة والالتزام بالمواعيد.
      الوقت ثمين في ثقافة العمل الألمانية، ومن المهم الالتزام بمواعيد الاجتماعات.
      هذه المفردات ستساعدك على التواصل في بيئة العمل.
    examples:
      - q: "Ich arbeite in einer Firma"
        a: "أعمل في شركة"
        rel:
          - ["Firma", "شركة", "اسم"]
          - ["arbeite", "أعمل", "فعل"]
      - q: "Büro"
        a: "مكتب"
        rel:
          - ["Büro", "مكتب", "مكان العمل"]
      - q: "Besprechung"
        a: "اجتماع / اجتماع عمل"
        rel:
          - ["Besprechung", "اجتماع", "اسم"]
      - q: "Gehalt"
        a: "راتب"
        rel:
          - ["Gehalt", "راتب", "اسم"]
      - q: "Urlaub"
        a: "إجازة"
        rel:
          - ["Urlaub", "إجازة / عطلة", "اسم"]
  - title: "التعليم والمدرسة"
    explanation: |
      **التعليم الألماني** (Bildung) يتمتع بسمعة عالمية ممتازة.
      النظام التعليمي الألماني معقد نسبياً ويتضمن مسارات مختلفة مثل Gymnasium (للجامعة) وHauptschule.
      هذه أهم الكلمات التي ستحتاجها للحديث عن التعليم.
    examples:
      - q: "Schule"
        a: "مدرسة"
        rel:
          - ["Schule", "مدرسة", "مؤسسة تعليمية"]
      - q: "Universität"
        a: "جامعة"
        rel:
          - ["Universität", "جامعة", "مؤسسة تعليمية"]
      - q: "Student"
        a: "طالب جامعي"
        rel:
          - ["Student", "طالب جامعي", "شخص"]
      - q: "Ich lerne Deutsch"
        a: "أتعلم اللغة الألمانية"
        rel:
          - ["lerne", "أتعلم", "فعل"]
          - ["Deutsch", "الألمانية", "اللغة"]
      - q: "Abschluss"
        a: "شهادة / درجة علمية"
        rel:
          - ["Abschluss", "شهادة / تخرج", "اسم"]
