version: 1
number: 10
title: "المشاعر والآراء"
description: "التعبير عن المشاعر والآراء باللغة الألمانية لمحادثات أعمق"
sections:
  - title: "المشاعر والعواطف"
    explanation: |
      **التعبير عن المشاعر** باللغة الألمانية يجعل محادثاتك أكثر عمقاً وإنسانية.
      الألمان يُقدِّرون الصراحة والصدق في التعبير عن المشاعر.
      كلمة "Gemütlichkeit" (الدفء والراحة) تعبر عن مشاعر الألمان تجاه التجمعات الأسرية الدافئة.
    examples:
      - q: "Ich bin glücklich"
        a: "أنا سعيد"
        rel:
          - ["glücklich", "سعيد / مبسوط", "صفة"]
      - q: "Ich bin traurig"
        a: "أنا حزين"
        rel:
          - ["traurig", "حزين", "صفة"]
      - q: "Ich habe Angst"
        a: "أنا خائف"
        rel:
          - ["Angst", "خوف / قلق", "اسم"]
      - q: "Ich bin begeistert"
        a: "أنا متحمس / أنا مفتون"
        rel:
          - ["begeistert", "متحمس / مفتون", "صفة"]
      - q: "Ich vermisse dich"
        a: "أشتاق إليك"
        rel:
          - ["vermisse", "أشتاق", "فعل"]
      - q: "Ich liebe dich"
        a: "أحبك"
        rel:
          - ["Ich-liebe-dich", "أحبك", "تعبير عن الحب"]
  - title: "التعبير عن الآراء"
    explanation: |
      **إبداء الرأي** باللغة الألمانية يتطلب بعض التعبيرات الدقيقة.
      الألمان يُقدِّرون الحوار المباشر والمُرتَّب — قل رأيك بوضوح مع الاحترام.
      عبارة "Ich finde, dass..." (أجد أن / أعتقد أن) شائعة جداً في المحادثات الألمانية.
    examples:
      - q: "Meiner Meinung nach..."
        a: "في رأيي..."
        rel:
          - ["Meiner-Meinung-nach", "في رأيي", "تعبير عن الرأي"]
      - q: "Ich denke, dass..."
        a: "أعتقد أن..."
        rel:
          - ["denke", "أعتقد / أفكر", "فعل"]
      - q: "Ich stimme zu"
        a: "أوافق"
        rel:
          - ["stimme-zu", "أوافق", "فعل"]
      - q: "Ich stimme nicht zu"
        a: "لا أوافق"
        rel:
          - ["stimme-nicht-zu", "لا أوافق", "نفي"]
      - q: "Das stimmt"
        a: "هذا صحيح"
        rel:
          - ["stimmt", "صحيح / هذا صحيح", "صفة"]
  - title: "التفضيلات والأمنيات"
    explanation: |
      **التعبير عن التفضيلات والأمنيات** يجعل محادثاتك أكثر حيوية وطبيعية.
      تعلُّم كيفية قول ما تحب وما لا تحب بالألمانية سيساعدك على بناء صداقات حقيقية.
    examples:
      - q: "Ich mag Kaffee"
        a: "أحب القهوة"
        rel:
          - ["mag", "أحب / يعجبني", "فعل"]
          - ["Kaffee", "قهوة", "مشروب"]
      - q: "Ich mag die Hitze nicht"
        a: "لا أحب الحر"
        rel:
          - ["mag-nicht", "لا أحب", "نفي"]
          - ["Hitze", "الحر / الحرارة", "اسم"]
      - q: "Ich bevorzuge..."
        a: "أفضِّل..."
        rel:
          - ["bevorzuge", "أفضِّل", "فعل"]
      - q: "Ich wünsche mir zu reisen"
        a: "أتمنى أن أسافر"
        rel:
          - ["wünsche-mir", "أتمنى / أرغب في", "فعل"]
          - ["reisen", "السفر", "فعل / اسم"]
      - q: "Hoffentlich!"
        a: "إن شاء الله! / آمل ذلك!"
        rel:
          - ["Hoffentlich", "إن شاء الله / آمل ذلك", "تعبير عن الأمل"]
