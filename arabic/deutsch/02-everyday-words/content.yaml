version: 1
number: 2
title: "كلمات يومية"
description: "كلمات أساسية للحياة اليومية – المتضادات والألوان وأفراد العائلة"
sections:
  - title: "نعم، لا، والمتضادات"
    explanation: |
      **المتضادات الأساسية** ضرورية للتواصل باللغة الألمانية.
      "Ja" تعني "نعم" و "Nein" تعني "لا".
      هذه الكلمات البسيطة تساعدك على الإجابة على الأسئلة فورًا.
    examples:
      - q: "Ja"
        a: "نعم"
        rel:
          - ["Ja", "نعم", "موافقة"]
      - q: "Nein"
        a: "لا"
        rel:
          - ["Nein", "لا", "نفي"]
      - q: "groß"
        a: "كبير"
        rel:
          - ["groß", "كبير", "صفة، عكس klein"]
      - q: "klein"
        a: "صغير"
        rel:
          - ["klein", "صغير", "صفة، عكس groß"]
      - q: "neu"
        a: "جديد"
        rel:
          - ["neu", "جديد", "صفة، عكس alt"]
  - title: "الألوان"
    explanation: |
      **الألوان** في الألمانية لا تتغير حسب الجنس عند استخدامها كصفة مسندة.
      هنا ستتعلم أهم الألوان باللغة الألمانية.
    examples:
      - q: "weiß"
        a: "أبيض"
        rel:
          - ["weiß", "أبيض", "لون"]
      - q: "schwarz"
        a: "أسود"
        rel:
          - ["schwarz", "أسود", "لون"]
      - q: "rot"
        a: "أحمر"
        rel:
          - ["rot", "أحمر", "لون"]
      - q: "blau"
        a: "أزرق"
        rel:
          - ["blau", "أزرق", "لون"]
      - q: "grün"
        a: "أخضر"
        rel:
          - ["grün", "أخضر", "لون"]
  - title: "أفراد العائلة"
    explanation: |
      **العائلة** (die Familie) مهمة جدًا في الثقافة الألمانية.
      من المفيد معرفة أسماء أفراد العائلة للتواصل في الحياة اليومية.
    examples:
      - q: "der Vater"
        a: "الأب"
        rel:
          - ["der Vater", "الأب", "فرد من العائلة"]
      - q: "die Mutter"
        a: "الأم"
        rel:
          - ["die Mutter", "الأم", "فرد من العائلة"]
      - q: "der Sohn"
        a: "الابن"
        rel:
          - ["der Sohn", "الابن", "فرد من العائلة"]
      - q: "die Tochter"
        a: "الابنة"
        rel:
          - ["die Tochter", "الابنة", "فرد من العائلة"]
      - q: "der Bruder"
        a: "الأخ"
        rel:
          - ["der Bruder", "الأخ", "فرد من العائلة"]
