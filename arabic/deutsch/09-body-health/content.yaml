version: 1
number: 9
title: "الجسم والصحة"
description: "أجزاء الجسم والصحة وزيارة الطبيب باللغة الألمانية"
sections:
  - title: "أجزاء الجسم"
    explanation: |
      **معرفة أجزاء الجسم** باللغة الألمانية ضرورية جداً، خاصةً عند زيارة الطبيب.
      في ألمانيا، نظام الرعاية الصحية ممتاز وتحتاج إلى تأمين صحي (Krankenversicherung).
      هذه المفردات ستساعدك على وصف أعراضك للطبيب بدقة.
    examples:
      - q: "der Kopf"
        a: "الرأس"
        rel:
          - ["der-Kopf", "الرأس", "جزء من الجسم"]
      - q: "das Auge"
        a: "العين"
        rel:
          - ["das-Auge", "العين", "جزء من الجسم"]
      - q: "das Ohr"
        a: "الأذن"
        rel:
          - ["das-Ohr", "الأذن", "جزء من الجسم"]
      - q: "der Mund"
        a: "الفم"
        rel:
          - ["der-Mund", "الفم", "جزء من الجسم"]
      - q: "die Hand"
        a: "اليد"
        rel:
          - ["die-Hand", "اليد", "جزء من الجسم"]
      - q: "das Herz"
        a: "القلب"
        rel:
          - ["das-Herz", "القلب", "عضو / رمز المشاعر"]
      - q: "der Rücken"
        a: "الظهر"
        rel:
          - ["der-Rücken", "الظهر", "جزء من الجسم"]
  - title: "عند الطبيب"
    explanation: |
      **عند الطبيب** (beim Arzt) في ألمانيا، تحتاج عادةً إلى موعد مسبق (Termin).
      يسألك الطبيب "Was fehlt Ihnen?" (ما الذي يؤلمك؟) أو "Wo tut es weh?" (أين يؤلمك؟).
      من المهم أن تصف أعراضك بوضوح.
    examples:
      - q: "Ich habe Schmerzen"
        a: "أشعر بألم"
        rel:
          - ["Schmerzen", "آلام / أوجاع", "اسم جمع"]
      - q: "Ich habe Fieber"
        a: "عندي حمى"
        rel:
          - ["Fieber", "حمى / ارتفاع حرارة", "عَرَض"]
      - q: "Ich brauche einen Arzt"
        a: "أحتاج طبيباً"
        rel:
          - ["brauche", "أحتاج", "فعل"]
          - ["Arzt-akk", "طبيباً", "مفعول به"]
      - q: "Wo ist die nächste Apotheke?"
        a: "أين أقرب صيدلية؟"
        rel:
          - ["Apotheke", "صيدلية", "اسم"]
          - ["nächste", "الأقرب / القريبة", "صفة"]
      - q: "Medikament"
        a: "دواء"
        rel:
          - ["Medikament", "دواء / دواء طبي", "اسم"]
  - title: "الصحة والعافية"
    explanation: |
      **الصحة** (die Gesundheit) كنز لا يُقدَّر في كل ثقافة.
      في ألمانيا، يقولون "Gesundheit!" (صحة / الله يشفيك) عندما يعطس شخص ما — هذا تقليد راسخ.
      اهتمام الألمان بالرياضة والهواء الطلق يعكس تقديرهم العميق للصحة.
    examples:
      - q: "Ich bin gesund"
        a: "أنا بصحة جيدة"
        rel:
          - ["gesund", "بصحة جيدة / سليم", "صفة"]
      - q: "Ich fühle mich müde"
        a: "أشعر بتعب"
        rel:
          - ["müde", "متعب / مرهق", "صفة"]
      - q: "Gute Besserung!"
        a: "سلامتك / الله يشفيك!"
        rel:
          - ["Gute-Besserung", "سلامتك / الشفاء العاجل", "تعبير تمنٍّ"]
      - q: "Gesundheit!"
        a: "صحة! (بعد العطسة)"
        rel:
          - ["Gesundheit-ausruf", "صحة! (تُقال بعد العطسة)", "تعبير ثقافي"]
      - q: "Sport ist gesund"
        a: "الرياضة مفيدة للصحة"
        rel:
          - ["Sport", "رياضة", "اسم"]
          - ["gesund-adj", "صحي / مفيد للصحة", "صفة"]
