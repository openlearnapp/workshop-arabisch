version: 1
number: 1
title: "التحيات والأدب"
description: "أهم التحيات والعبارات المهذبة باللغة الألمانية"
sections:
  - title: "التحيات"
    explanation: |
      **التحيات الألمانية** تختلف حسب الوقت والمناسبة.
      التحية الأكثر شيوعًا هي "Hallo" وهي مناسبة لجميع المواقف غير الرسمية.
      في المواقف الرسمية، يُستخدم "Guten Tag" (يوم سعيد).
    examples:
      - q: "Hallo"
        a: "مرحبا"
        rel:
          - ["Hallo", "مرحبا", "تحية عامة غير رسمية"]
      - q: "Guten Morgen"
        a: "صباح الخير"
        rel:
          - ["Guten", "سعيد / طيب", "صفة"]
          - ["Morgen", "صباح", "وقت من اليوم"]
      - q: "Guten Tag"
        a: "يوم سعيد (مرحبا)"
        rel:
          - ["Guten", "سعيد / طيب", "صفة"]
          - ["Tag", "يوم", "وقت من اليوم"]
      - q: "Guten Abend"
        a: "مساء الخير"
        rel:
          - ["Guten", "سعيد / طيب", "صفة"]
          - ["Abend", "مساء", "وقت من اليوم"]
      - q: "Willkommen"
        a: "أهلا وسهلا"
        rel:
          - ["Willkommen", "أهلا وسهلا", "ترحيب"]
  - title: "عبارات مهذبة"
    explanation: |
      **الأدب** مهم جدًا في الثقافة الألمانية.
      كلمة "Bitte" (من فضلك) و "Danke" (شكرًا) تُستخدمان كثيرًا في الحياة اليومية.
    examples:
      - q: "Danke"
        a: "شكرًا"
        rel:
          - ["Danke", "شكرًا", "تعبير عن الامتنان"]
      - q: "Bitte"
        a: "من فضلك / عفوًا"
        rel:
          - ["Bitte", "من فضلك", "للطلب المهذب أو كرد على شكرًا"]
      - q: "Entschuldigung"
        a: "عذرًا / المعذرة"
        rel:
          - ["Entschuldigung", "عذرًا", "للاعتذار أو لفت الانتباه"]
      - q: "Wie geht es Ihnen?"
        a: "كيف حالك؟ (رسمي)"
        rel:
          - ["Wie", "كيف", "كلمة استفهام"]
          - ["geht", "يذهب / يسير", "فعل"]
          - ["Ihnen", "لك (رسمي)", "ضمير"]
      - q: "Gut, danke"
        a: "بخير، شكرًا"
        rel:
          - ["Gut", "جيد / بخير", "صفة"]
          - ["danke", "شكرًا", "تعبير عن الامتنان"]
  - title: "الوداع"
    explanation: |
      **عبارات الوداع** في الألمانية متنوعة.
      "Tschüss" هي الأكثر شيوعًا في المواقف غير الرسمية، بينما "Auf Wiedersehen" تُستخدم في المواقف الرسمية.
    examples:
      - q: "Tschüss"
        a: "مع السلامة (غير رسمي)"
        rel:
          - ["Tschüss", "مع السلامة", "وداع غير رسمي"]
      - q: "Auf Wiedersehen"
        a: "إلى اللقاء (رسمي)"
        rel:
          - ["Auf", "إلى", "حرف جر"]
          - ["Wiedersehen", "اللقاء مرة أخرى", "اسم"]
      - q: "Gute Nacht"
        a: "تصبح على خير"
        rel:
          - ["Gute", "سعيدة / طيبة", "صفة"]
          - ["Nacht", "ليلة", "وقت من اليوم"]
      - q: "Bis bald"
        a: "إلى اللقاء قريبًا"
        rel:
          - ["Bis", "حتى", "حرف جر"]
          - ["bald", "قريبًا", "ظرف زمان"]
